name: Quality Checks

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Format, Test, and Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            os: linux
          - runner: windows-2025
            os: windows
          - runner: macos-latest
            os: macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          os: ${{ matrix.os }}

      - name: Install Selene
        if: matrix.os == 'linux'
        shell: bash
        run: |
          curl -fL -o selene.zip https://github.com/Kampfkarren/selene/releases/download/0.27.1/selene-0.27.1-linux.zip
          unzip selene.zip
          chmod +x selene
          sudo mv selene /usr/local/bin/
          rm selene.zip

      - name: Format Check
        run: npm run format:check

      - name: Type Check
        run: npm run typecheck

      - name: Rust Check
        run: npm run rust:check

      - name: Rust Lint
        run: npm run rust:lint

      - name: Rust Test
        run: npm run rust:test

      - name: Build Plugin
        if: matrix.os == 'linux'
        run: npm run build:plugin

      - name: Lint Roblox Plugin
        if: matrix.os == 'linux'
        run: selene plugin-build/ISpooferMotion.generated.luau

      - name: Web Lint
        run: npm run lint

      - name: Web Test
        run: npm run test

      - name: Web Build
        run: npm run build
